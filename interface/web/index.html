<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenusAI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <!-- Left Sidebar: Chat & Settings -->
        <aside id="left-sidebar" class="sidebar left-sidebar">
            <button id="new-chat-btn" class="new-chat-btn" title="New conversation">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New chat
            </button>
            <div class="sidebar-label">Chat History</div>
            <div id="chat-history-list" class="history-list">
                <div class="history-item active">Current Session</div>
            </div>
            
            <div class="sidebar-footer">
                <button class="settings-btn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main-area" class="main-area empty">
            <!-- Messages container -->
            <div id="messages-container" class="messages-container">
                <!-- Chat messages go here -->
                <div id="chat-messages" class="chat-messages hidden"></div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <h1 id="welcome-title" class="welcome-title">XenusAI</h1>
                <div class="input-wrapper">
                    <textarea id="query-input" class="query-input" placeholder="Message XenusAI..." rows="1"
                        autocomplete="off" autofocus></textarea>
                    
                    <select id="mic-select" class="mic-select" title="Hardware Audio Source" style="display: none;"></select>
                    <button id="mic-btn" class="mic-btn" title="Dictate Action">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>

                    <button id="send-btn" class="send-btn" disabled title="Send">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span>XenusAI can make mistakes. Verify important information.</span>
                </div>
            </div>
        </main>

        <!-- Right Sidebar: Knowledge Base & Ingestion -->
        <aside id="right-sidebar" class="sidebar right-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Knowledge Base</div>
                <div id="kb-stats" class="kb-stats">
                    <div class="stat-row">
                        <span class="stat-label">Chunks</span>
                        <span id="stat-chunks" class="stat-value">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sources</span>
                        <span id="stat-sources" class="stat-value">0</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Ingest Data</div>
                <div class="ingest-area">
                    <input type="text" id="ingest-input" class="ingest-input" placeholder="URL or file path...">
                    <button id="ingest-btn" class="ingest-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Ingest
                    </button>
                </div>
                <div id="ingest-status" class="ingest-status hidden"></div>
            </div>

            <div class="sidebar-section sources-section">
                <div class="sidebar-label">Active Sources</div>
                <div id="sources-list" class="sources-list">
                    <div class="empty-state-small">No sources yet</div>
                </div>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script src="app.js"></script>
</body>
</html>
